<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Politivector</title>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">

    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/questions/questions.css">

    <!-- _i18n.js runs synchronously to set window.__locale before question_handler reads it -->
    <script src="scripts/_i18n.js"></script>
    <script src="scripts/_menu.js" defer></script>
    <script src="scripts/_language.js" defer></script>
    <script src="scripts/_variant_font.js" defer></script>
    <script src="scripts/_reveal.js" defer></script>

    <!-- questions.js must load before question_handler.js -->
    <script src="data/questions.js"></script>
    <script src="scripts/question_handler.js"></script>
</head>
<body>
<div class="grid-container">
    <!-- nav -->
    <header id="nav">
        <div id="logo-container">

            <p id="type-logo">politivector</p>
        </div>
        <svg id="menu-icon" viewBox="0 0 24 24" fill="var(--clr-text-primary)" class="closed">
            <rect class="line top" x="3" y="6" width="18" height="2" rx=".95" ry=".95"></rect>
            <rect class="line middle" x="3" y="11" width="18" height="2" rx=".95" ry=".95"></rect>
            <rect class="line bottom" x="3" y="16" width="18" height="2" rx=".95" ry=".95"></rect>
        </svg>
    </header>
    <div id="menu">
        <ul id="menu-list">
            <li><a class="link" href="index.html" data-i18n="menu-home"></a></li>
            <li><a class="link" href="plans.html" data-i18n="menu-future-plans"></a></li>
            <li>
                <div id="language-selector"><!-- Generated by JS --></div>
            </li>
        </ul>
    </div>
    <!-- /nav -->

    <div id="question">
        <div id="card">
            <h3 id="question-number" class="semi-bold no-reveal" style="--delay: 100ms"></h3>
            <p id="question-text" class="no-reveal" style="--delay: 200ms"></p>
            <div class="button-container">
                <button id="aa" class="button no-reveal" onclick="questionAnswered(0);" style="--delay: 300ms"
                        data-i18n="questions-absolutely-agree"></button>
                <button id="pa" class="button no-reveal" onclick="questionAnswered(1);" style="--delay: 400ms"
                        data-i18n="questions-partially-agree"></button>
                <button id="ne" class="button no-reveal" onclick="questionAnswered(2);" style="--delay: 500ms"
                        data-i18n="questions-neutral"></button>
                <button id="pd" class="button no-reveal" onclick="questionAnswered(3);" style="--delay: 600ms"
                        data-i18n="questions-partially-disagree"></button>
                <button id="ad" class="button no-reveal" onclick="questionAnswered(4);" style="--delay: 700ms"
                        data-i18n="questions-absolutely-disagree"></button>
                <button id="back" class="button no-reveal" onclick="previousQuestion();"
                        style="--delay: 800ms"></button>
            </div>
        </div>
    </div>
</div>
<footer>
    <div id="footer">
        <div class="footer-list">
            <div class="footer-item">
                <a href="index.html" class="semi-bold" data-i18n="footer-home"></a>
                <a href="index.html#features" data-i18n="footer-home-features"></a>
                <a href="index.html#info" data-i18n="footer-home-information"></a>
                <a href="index.html#goals" data-i18n="footer-home-goals"></a>
            </div>
            <div class="footer-item">
                <a href="plans.html" class="semi-bold" data-i18n="footer-plans"></a>
                <a href="plans.html#questions" data-i18n="footer-plans-questions"></a>
                <a href="plans.html#data" data-i18n="footer-plans-data"></a>
                <a href="plans.html#results" data-i18n="footer-plans-results"></a>
            </div>
            <div class="footer-item">
                <p class="semi-bold" data-i18n="footer-test"></p>
                <a href="start.html?test=complete" data-i18n="footer-test-complete"></a>
                <a href="start.html?test=basic" data-i18n="footer-test-basic"></a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
